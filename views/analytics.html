<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ronnin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background: #050505; color: #fff; font-family: 'Outfit', sans-serif; padding: 20px;">
<div class="scroll-anim glass-panel full-card">
    <h3 class="mb-2">Mileage Trend</h3>
    <div class="chart-container">
        <canvas id="mileageChart"></canvas>
    </div>
</div>

<div class="scroll-anim glass-panel full-card mt-4" style="transition-delay: 0.1s">
    <h3 class="mb-2">Expenses Distribution</h3>
    <div class="chart-container" style="height: 200px;">
        <canvas id="expensePieChart"></canvas>
    </div>
</div>

<div class="scroll-anim glass-panel full-card mt-4" style="transition-delay: 0.15s">
    <h3 class="mb-2">Total Costs Overview</h3>
    <div class="chart-container" style="height: 200px;">
        <canvas id="costsBarChart"></canvas>
    </div>
</div>

<div class="scroll-anim glass-panel full-card mt-4" style="transition-delay: 0.16s">
    <h3 class="mb-2">Fuel Price Trend</h3>
    <div class="chart-container" style="height: 200px;">
        <canvas id="fuelPriceChart"></canvas>
    </div>
</div>

<div class="scroll-anim glass-panel full-card mt-4" style="transition-delay: 0.17s">
    <h3 class="mb-2">Recent Trips Distance</h3>
    <div class="chart-container" style="height: 200px;">
        <canvas id="tripsChart"></canvas>
    </div>
</div>

<div class="scroll-anim glass-panel full-card mt-4" style="transition-delay: 0.18s">
    <h3 class="mb-2">Maint. Breakdown</h3>
    <div class="chart-container" style="height: 200px;">
        <canvas id="maintBreakdownChart"></canvas>
    </div>
</div>

<div class="scroll-anim stats-grid mt-4" style="transition-delay: 0.2s">
    <button id="btn-export-pdf" class="btn-secondary">
        <i class="fas fa-file-pdf"></i> Export PDF
    </button>
    <button id="btn-share-whatsapp" class="btn-secondary">
        <i class="fab fa-whatsapp"></i> Share
    </button>
</div>

</body>
</html>
