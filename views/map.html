<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map</title>
</head>
<body>
<div class="scroll-anim glass-panel full-card" style="padding:0; overflow:hidden; position:relative; height: 60vh; border-radius: 32px;">
    <div id="leaflet-map" style="width: 100%; height: 100%; z-index: 1;"></div>
    
    <!-- Floating controls over map -->
    <div class="map-controls" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; display: flex; justify-content: center; gap: 10px;">
        <button id="btn-start-trip" class="btn-primary" style="margin:0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); padding: 12px 24px; border-radius: 20px; font-weight: bold;"><i class="fas fa-play"></i> Start Trip</button>
        <button id="btn-stop-trip" class="btn-primary danger-glow" style="margin:0; display:none; padding: 12px 24px; border-radius: 20px; font-weight: bold;"><i class="fas fa-stop"></i> Stop Trip</button>
    </div>
    
    <div class="map-top-controls" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; display: flex; justify-content: center; gap: 10px;">
        <button id="btn-find-fuel" class="menu-btn outline-btn" style="background:var(--surface); backdrop-filter:blur(10px); padding:8px 12px; font-size:13px; width:auto; border-radius: 16px;">
            <i class="fas fa-gas-pump text-accent"></i> Find Fuel
        </button>
        <button id="btn-find-service" class="menu-btn outline-btn" style="background:var(--surface); backdrop-filter:blur(10px); padding:8px 12px; font-size:13px; width:auto; border-radius: 16px;">
            <i class="fas fa-tools text-danger"></i> Find Service
        </button>
    </div>

    <!-- Trip HUD -->
    <div id="trip-hud" class="trip-hud glass-panel" style="display:none; position: absolute; top: 70px; right: 20px; z-index: 1000; padding: 15px; text-align: center; border-radius: 20px; border: 1px solid var(--accent); background: rgba(0,0,0,0.6);">
        <div style="display:flex; gap: 15px;">
            <div>
                <div><span id="trip-dist" class="font-bold text-accent" style="font-size:24px;">0.0</span> km</div>
                <div class="text-sub" style="font-size:12px;">Distance</div>
            </div>
            <div>
                <div><span id="trip-speed" class="font-bold text-danger" style="font-size:24px;">0</span> km/h</div>
                <div class="text-sub" style="font-size:12px;">Speed</div>
            </div>
        </div>
        <div class="mt-2 text-sub" style="font-size:12px; border-top:1px solid rgba(255,255,255,0.1); padding-top:5px;">
            Top Speed: <span id="trip-top-speed" class="text-accent">0</span> km/h
        </div>
        <div class="text-sub mt-2" style="font-size:10px;"><i class="fas fa-satellite text-success"></i> GPS Active</div>
    </div>
</div>

<div class="scroll-anim glass-panel full-card mt-4">
    <h3 class="mb-2"><i class="fas fa-route text-accent"></i> Recent Trips</h3>
    <div id="trips-list" class="log-list">
        <p class="text-sub text-center">Loading trips...</p>
    </div>
</div>
</body>
</html>
