<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ronnin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background: #050505; color: #fff; font-family: 'Outfit', sans-serif; padding: 20px;">
<div class="scroll-anim dashboard-hero" style="transition-delay: 0.0s">
    <h2 id="dash-greeting" class="font-bold mb-2">Good Morning, Rider</h2>
    <p class="text-sub">Here is your bike's status today.</p>
</div>

<div class="scroll-anim glass-panel alert-card" id="dashboard-alert" style="transition-delay: 0.05s">
    <i class="fas fa-exclamation-triangle"></i>
    <div class="alert-details">
        <div class="alert-title font-bold">Upcoming Service</div>
        <div class="alert-desc text-sub" id="alert-desc-text">Service due in 200 km</div>
    </div>
</div>

<div class="scroll-anim glass-panel full-card" style="transition-delay: 0.1s">
    <h3 class="mb-2"><i class="fas fa-heartbeat text-accent"></i> Vehicle Health</h3>
    <div class="health-bar-container">
        <div class="health-label">
            <span>Next Service Due</span>
            <span id="health-service-dist" class="text-accent font-bold">-- km</span>
        </div>
        <div class="health-bar-bg">
            <div class="health-bar-fill" id="health-service-bar"></div>
        </div>
    </div>
    <div class="quick-actions mt-4">
        <button class="qa-btn" onclick="document.querySelector('.fab-item[data-action=\'modal-add-fuel\']').click()">
            <div class="qa-icon" style="color:#00ffcc"><i class="fas fa-gas-pump"></i></div>
            <span>Fuel</span>
        </button>
        <button class="qa-btn" onclick="document.querySelector('.fab-item[data-action=\'modal-add-service\']').click()">
            <div class="qa-icon" style="color:#ff4757"><i class="fas fa-oil-can"></i></div>
            <span>Service</span>
        </button>
        <button class="qa-btn" onclick="document.querySelector('.fab-item[data-action=\'modal-add-maintenance\']').click()">
            <div class="qa-icon" style="color:#2ed573"><i class="fas fa-tools"></i></div>
            <span>Maint</span>
        </button>
    </div>
</div>

<div class="stats-grid">
    <div class="scroll-anim glass-panel stat-card" style="transition-delay: 0.15s">
        <i class="fas fa-tachometer-alt"></i>
        <div class="stat-value" id="dash-odo">0</div>
        <div class="stat-label">Current ODO (km)</div>
    </div>
    <div class="scroll-anim stat-card glass-panel" style="transition-delay: 0.2s">
        <i class="fas fa-route"></i>
        <div class="stat-value" id="dash-mileage">0.0</div>
        <div class="stat-label">Avg Mileage (km/L)</div>
    </div>
    <div class="scroll-anim stat-card glass-panel" style="transition-delay: 0.25s">
        <i class="fas fa-gas-pump"></i>
        <div class="stat-value" id="dash-fuel">0</div>
        <div class="stat-label">Total Fuel (L)</div>
    </div>
    <div class="scroll-anim stat-card glass-panel" style="transition-delay: 0.3s">
        <i class="fas fa-tools"></i>
        <div class="stat-value" id="dash-maint">$0</div>
        <div class="stat-label">Total Maint.</div>
    </div>
</div>

<div class="scroll-anim glass-panel full-card" style="transition-delay: 0.5s">
    <h3 class="mb-2">Recent Logs</h3>
    <div class="log-list" id="dash-recent-logs">
        <!-- Dynamic logs here -->
        <p class="text-sub text-center load-pulse">Loading...</p>
    </div>
</div>

</body>
</html>
